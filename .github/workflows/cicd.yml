name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    permissions:   # ← ★これを追加
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: backend/demo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: ./mvnw clean package

      # AWS認証（OIDC）
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # ←これ使うのが正解
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t cicd-demo .

      - name: Tag Docker image
        run: |
          docker tag cicd-demo:latest ${{ steps.login-ecr.outputs.registry }}/cicd-demo-backend:latest

      - name: Push to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/cicd-demo-backend:latest

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/app/dist